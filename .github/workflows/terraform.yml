name: Terraform

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
      # Checkout the repository
      - name: Checkout
        uses: actions/checkout@v4

      # Debug repository contents
      - name: Debug Repository
        run: |
          echo "Current working directory:"
          pwd

          echo ""
          echo "Repository contents:"
          ls -la

          echo ""
          echo "Repository tree:"
          find .

          echo ""
          echo "Terraform files:"
          find . -name "*.tf"

      # Debug Terraform directory
      - name: Debug Terraform Directory
        run: |
          echo "Listing environments/non-prod"
          ls -la environments/non-prod || true

          echo ""
          echo "Terraform files in environments/non-prod"
          find environments/non-prod -name "*.tf" || true

          echo ""
          echo "Current directory contents"
          cd environments/non-prod
          pwd
          ls -la

          echo ""
          echo "Contents of main.tf"
          cat main.tf || true

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      # Initialize Terraform
      - name: Terraform Init
        working-directory: environments/non-prod
        run: terraform init

      # Check formatting
      - name: Terraform Format
        working-directory: environments/non-prod
        run: terraform fmt -check

      # Validate configuration
      - name: Terraform Validate
        working-directory: environments/non-prod
        run: terraform validate

      # Create execution plan
      - name: Terraform Plan
        working-directory: environments/non-prod
        run: terraform plan -input=false

      # Apply changes on push to main
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: environments/non-prod
        run: terraform apply -auto-approve -input=false
